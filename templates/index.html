<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CO₂ Thermodynamic Tool</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }
        .card {
            background: #1e293b;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
        .btn-custom {
            background: #38bdf8;
            border: none;
        }
        .btn-custom:hover {
            background: #0ea5e9;
        }
        input {
            background: #334155 !important;
            color: white !important;
            border: none !important;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <h1 class="text-center mb-5">CO₂–H₂O Thermodynamic Tool</h1>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-4" id="tabs">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#pressure">
                Pressure Solver
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#solubility">
                Solubility Solver
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- PRESSURE -->
        <div class="tab-pane fade show active" id="pressure">
            <div class="card">

                <h4>PR EOS + Henry Model</h4>

                <input id="T" class="form-control mb-2" placeholder="Temperature (K)">
                <input id="x" class="form-control mb-2" placeholder="x_CO2 (liquid)">
                <input id="y" class="form-control mb-3" placeholder="y_CO2 (vapor)">

                <button class="btn btn-custom w-100" onclick="calcPressure()">
                    Calculate Pressure
                </button>

                <div id="pressureResult" class="mt-3"></div>

            </div>
        </div>

        <!-- SOLUBILITY -->
        <div class="tab-pane fade" id="solubility">
            <div class="card">

                <h4>γ–φ Model</h4>

                <input id="T2" class="form-control mb-2" placeholder="Temperature (°C)">
                <input id="P2" class="form-control mb-2" placeholder="Pressure (bar)">
                <input id="m" class="form-control mb-3" placeholder="Salinity">

                <button class="btn btn-custom w-100" onclick="calcSolubility()">
                    Calculate
                </button>

                <div id="solResult" class="mt-3"></div>

            </div>
        </div>

    </div>

</div>

<!-- JS -->
<script>

async function calcPressure() {
    const T = document.getElementById("T").value;
    const x = document.getElementById("x").value;
    const y = document.getElementById("y").value;

    const res = await fetch(`/pressure?T=${T}&x=${x}&y=${y}`);
    const data = await res.json();

    document.getElementById("pressureResult").innerHTML =
        `<div class="alert alert-info">Pressure = ${data["Pressure (MPa)"]} MPa</div>`;
}

async function calcSolubility() {
    const T = document.getElementById("T2").value;
    const P = document.getElementById("P2").value;
    const m = document.getElementById("m").value;

    const res = await fetch(`/solubility?T=${T}&P=${P}&m=${m}`);
    const data = await res.json();

    document.getElementById("solResult").innerHTML =
        `<div class="alert alert-success">
            x_CO2: ${data.x_CO2.toFixed(6)}<br>
            y_H2O: ${data.y_H2O.toFixed(6)}<br>
            Molality: ${data.molality.toFixed(3)}
        </div>`;
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
